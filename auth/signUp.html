<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - SignUp</title>

    <!-- Tailwind + DaisyUi -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CONFIGURATION YUP VIA CDN ET IMPORT MAP -->
    <script type="importmap">
        {
        "imports": {
            "yup": "https://cdn.jsdelivr.net/npm/yup@1.4.0/+esm"
        }
        }
    </script>

    <script type="module">
        import * as yup from 'yup'; 
    </script>

    <link rel="stylesheet" href="/styles/style.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50">

    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
            <div class="w-14 h-14 rounded-xl bg-primary flex items-center justify-center shadow">
                <svg width="26" height="26" fill="white" viewBox="0 0 24 24">
                    <path d="M4 5a3 3 0 013-3h10a3 3 0 013 3v8a3 3 0 01-3 3H9l-5 4V5z" />
                </svg>
            </div>
            <h1 class="mt-3 text-2xl font-bold text-primary">Kadea Chat</h1>
        </div>

        <!-- Formulaire -->

        <div class="card bg-white shadow-sm">
            <div class="card-body">
                <h2 class="text-2xl font-semibold">Create Account</h2>
                <p class="text-sm text-gray-500 mb-3">Join the community and start chatting.</p>

                <!-- Zone d'alerte globale pour l'API -->
                <div id="globalAlert" class="alert alert-error hidden text-sm p-2 mb-3"></div>

                <!-- FORMULAIRE DEBUT -->
                <form id="registerForm" novalidate>

                    <!-- Full Name -->
                    <label class="label"><span class="label-text">Full Name</span></label>
                    <label class="input flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-gray-400"></i>
                        <input type="text" name="fullName" class="grow" placeholder="Jane Doe">
                    </label>
                    <!-- Message d'erreur -->
                    <span id="error-fullName" class="text-error text-xs mt-1 block"></span>

                    <!-- Email -->
                    <label class="label"><span class="label-text">Email Address</span></label>
                    <label class="input flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-gray-400"></i>
                        <input type="email" name="email" class="grow" placeholder="name@example.com">
                    </label>
                    <!-- Message d'erreur -->
                    <span id="error-email" class="text-error text-xs mt-1 block"></span>

                    <!-- Password -->
                    <label class="label"><span class="label-text">Password</span></label>
                    <label class="input flex items-center gap-2">
                        <i data-lucide="lock" class="w-4 h-4 text-gray-400"></i>
                        <input id="password" type="password" name="password" class="grow" placeholder="••••••••">
                        <button type="button" id="togglePassword" class="btn btn-ghost btn-xs">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <!-- Message d'erreur -->
                    <span id="error-password" class="text-error text-xs mt-1 block"></span>

                    <!-- Confirm Password -->
                    <label class="label"><span class="label-text">Confirm Password</span></label>
                    <label class="input flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-4 h-4 text-gray-400"></i>
                        <input id="confirmPassword" type="password" name="confirmPassword" class="grow"
                            placeholder="••••••••">
                        <button type="button" id="toggleConfirm" class="btn btn-ghost btn-xs">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </label>
                    <!-- Message d'erreur -->
                    <span id="error-confirmPassword" class="text-error text-xs mt-1 block"></span>

                    <!-- Bouton de soumission  -->
                    <button type="submit" class="btn btn-primary w-full mt-5">
                        Create Account
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>

                </form>

                <p class="text-xs text-center text-gray-500 mt-3">
                    By signing up, you agree to our
                    <a href="#" class="link link-primary">Terms of Service</a> and
                    <a href="#" class="link link-primary">Privacy Policy</a>
                </p>
            </div>
        </div>

        <p class="text-center text-sm mt-5">
            Already have an account?
            <a href="signIn.html" class="link link-primary">Log in</a>
        </p>

    </div>

    <!-- Scripts -->

    <script type="module" src="/script/auth.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialisation des icônes lucides
        lucide.createIcons();

        // Système d'affichage de mot de passe existant
        function toggle(id) {
            // Ici La variable id est un paramètre dynamique. Elle sert de passerelle 
            // pour cibler précisément le champ de saisie (<input>) que l'on souhaite 
            // masquer ou afficher.
            const input = document.getElementById(id);
            // Si le type de l'input est "password", au clic il redevient un simple input "texte", 
            // on peut donc lire le texte qui y figure
            input.type = input.type === "password" ? "text" : "password";
        }
        //  Selon l'input sur lequel le user clique, on récupère cet Id qui sera passé à toggle
        // Si clique sur le premier mon id devient "password", sur le second "confirmPassword" et 
        // cce sera donc cela mon id.
        document.getElementById("togglePassword").onclick = (e) => { e.preventDefault(); toggle("password"); };
        document.getElementById("toggleConfirm").onclick = (e) => { e.preventDefault(); toggle("confirmPassword"); };
    </script>
</body>

</html>
